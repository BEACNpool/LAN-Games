<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>TEXAS HOLD'EM — GAMEHUB</title>
<meta name="theme-color" content="#070b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%23070b14"/><text x="32" y="46" font-size="34" text-anchor="middle">♠️</text></svg>'>
<link rel="stylesheet" href="/shared/shared.css">
<link rel="stylesheet" href="poker.css">
</head>
<body>
<div class="bg-fx" aria-hidden="true"></div>

<!-- ============ JOIN ============ -->
<section id="scr-join" class="scr" hidden>
  <div class="join-wrap">
    <h1 class="wordmark"><span class="wm-a">HOLD</span><span class="wm-b">'EM</span></h1>
    <p class="tagline">NO-LIMIT TEXAS HOLD'EM. LAST STACK STANDING.</p>
    <div class="join-card">
      <label class="field-label" for="name-input">CALL SIGN</label>
      <input id="name-input" maxlength="14" autocomplete="off" spellcheck="false" placeholder="your name">
      <label class="field-label">AVATAR</label>
      <div id="avatar-grid" class="avatar-grid"></div>
      <button id="pfp-btn" class="pfp-btn" type="button">📷 OR USE A PHOTO</button>
      <button id="join-btn" class="btn btn-primary btn-big">TAKE A SEAT</button>
    </div>
  </div>
</section>

<!-- ============ LOBBY ============ -->
<section id="scr-lobby" class="scr" hidden>
  <header class="topbar">
    <a href="/" class="icon-btn" title="hub" style="display:grid;place-items:center">🕹</a>
    <span class="wordmark-sm"><span class="wm-a">HOLD</span><span class="wm-b">'EM</span></span>
    <span style="display:flex;gap:8px">
      <button id="pfp-btn2" class="icon-btn" title="your photo">📷</button>
      <button id="mute-btn" class="icon-btn">🔊</button>
    </span>
  </header>
  <div class="lobby-body">
    <div class="lobby-sec">
      <div class="sec-head"><h2>AT THE TABLE</h2><span id="ready-count" class="sec-badge"></span></div>
      <div id="player-grid" class="player-grid"></div>
      <p class="seat-note" id="seat-note"></p>
    </div>
    <div class="lobby-sec">
      <div class="sec-head"><h2>TABLE RULES</h2></div>
      <div class="opt-row"><span class="field-label">TABLE</span>
        <div id="opt-table" class="seg"></div></div>
      <div class="opt-row"><span class="field-label">STAKES</span>
        <div id="opt-speed" class="seg"></div></div>
      <div class="opt-row"><span class="field-label">BOTS</span>
        <div id="opt-diff" class="seg"></div></div>
      <div class="opt-row"><span class="field-label">TURN CLOCK</span>
        <div class="stepper">
          <button id="turn-minus" class="step-btn">−</button>
          <span id="turn-val" class="step-val">25s</span>
          <button id="turn-plus" class="step-btn">+</button>
        </div></div>
      <p class="rules-note" id="rules-note"></p>
    </div>
  </div>
  <footer class="lobby-foot">
    <button id="ready-btn" class="btn btn-ready btn-big">READY UP</button>
    <button id="go-btn" class="btn btn-go btn-big" hidden>DEAL ME IN</button>
    <p id="lobby-hint" class="lobby-hint">waiting for players…</p>
  </footer>
</section>

<!-- ============ TABLE ============ -->
<section id="scr-table" class="scr" hidden>
  <header class="table-head">
    <a href="/" class="head-link">🕹</a>
    <div class="head-mid">
      <span id="head-hand" class="head-hand">HAND 1</span>
      <span id="head-blinds" class="head-blinds">10 / 20</span>
    </div>
    <button id="mute-btn2" class="icon-btn head-mute">🔊</button>
  </header>

  <div class="table-zone" id="table-zone">
    <div class="felt"></div>
    <div class="felt-ring"></div>
    <div id="seats" class="seats"></div>
    <div class="center">
      <div id="pot" class="pot" hidden><span class="pot-label">POT</span><span id="pot-amt">0</span></div>
      <div id="board" class="board"></div>
      <div id="table-msg" class="table-msg"></div>
    </div>
    <div id="showdown-banner" class="showdown-banner" hidden></div>
  </div>

  <!-- my seat detail: hole cards + action -->
  <div class="me-zone">
    <div id="my-hand" class="my-hand"></div>
    <div id="action-bar" class="action-bar" hidden>
      <div class="act-row" id="act-main">
        <button id="btn-fold" class="act-btn fold">FOLD</button>
        <button id="btn-check" class="act-btn check">CHECK</button>
        <button id="btn-call" class="act-btn call" hidden>CALL</button>
        <button id="btn-raise" class="act-btn raise" hidden>RAISE ▸</button>
      </div>
      <div class="raise-panel" id="raise-panel" hidden>
        <div class="raise-top">
          <span class="raise-to-label">RAISE TO</span>
          <span id="raise-amt" class="raise-amt">0</span>
          <button id="raise-cancel" class="raise-x">✕</button>
        </div>
        <input id="raise-slider" class="raise-slider" type="range" min="0" max="100" value="0">
        <div class="raise-presets" id="raise-presets"></div>
        <button id="raise-confirm" class="btn btn-go btn-big raise-confirm">CONFIRM</button>
      </div>
    </div>
    <p id="watch-note" class="watch-note" hidden>WATCHING — deal you in next match</p>
  </div>
</section>

<!-- game over -->
<div id="gameover" class="modal" hidden>
  <div class="modal-card go-card">
    <p class="go-crown">👑</p>
    <p id="go-title" class="go-title">WINNER</p>
    <p id="go-line" class="go-line"></p>
    <button id="rematch-btn" class="btn btn-primary btn-big">BACK TO LOBBY</button>
    <p id="go-auto" class="lobby-hint"></p>
  </div>
</div>

<div id="countdown-overlay" class="countdown-overlay" hidden><span id="countdown-num">3</span></div>
<canvas id="confetti"></canvas>

<script src="/shared/hubnet.js"></script>
<script src="/shared/brag.js"></script>
<script src="poker.js"></script>
</body>
</html>
