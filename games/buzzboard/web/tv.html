<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>BUZZ BOARD · BIG SCREEN</title>
<meta name="theme-color" content="#070810">
<link rel="stylesheet" href="/shared/shared.css">
<link rel="stylesheet" href="/shared/bigscreen.css">
<style>
  body.tv-body{background:radial-gradient(90% 100% at 45% -20%,rgba(118,87,255,.32),transparent 67%),radial-gradient(65% 80% at 100% 80%,rgba(245,179,1,.12),transparent 65%),#070810}.tv{padding:clamp(12px,1.8vh,24px) clamp(14px,1.8vw,32px)}.tv-main{grid-template-columns:1fr clamp(210px,19vw,310px);gap:clamp(12px,1.5vw,25px)}.tv-wordmark b{background:linear-gradient(120deg,#fff,#f5b301);-webkit-background-clip:text;background-clip:text}.tv-join{padding:12px}.tv-qr{max-height:20vh;margin:auto}.tv-roster{gap:6px}.tv-pl{padding:8px 11px}.bb-control{border-color:#f5b301!important;box-shadow:0 0 24px rgba(245,179,1,.17)}.bb-score{color:#f5b301}.bb-score.neg{color:#ff667d}.bb-board{width:100%;height:100%;display:grid;grid-template-columns:repeat(var(--cats),minmax(0,1fr));gap:clamp(5px,.65vw,11px);align-items:stretch}.bb-col{display:grid;grid-template-rows:minmax(58px,.8fr) repeat(var(--rows),1fr);gap:clamp(5px,.65vh,9px);min-width:0}.bb-cat{display:grid;place-items:center;padding:7px;border-radius:10px;background:linear-gradient(160deg,#2537b9,#121d7d);border:1px solid rgba(130,150,255,.45);font-weight:900;font-size:clamp(11px,1.2vw,18px);line-height:1.05;text-transform:uppercase;text-shadow:0 2px 9px #000;overflow:hidden}.bb-cell{display:grid;place-items:center;border-radius:10px;background:linear-gradient(155deg,#1529a8,#0d176c);border:1px solid rgba(115,135,255,.4);color:#f5b301;font:950 clamp(18px,2.5vw,42px) var(--mono);text-shadow:0 3px 0 #000;box-shadow:inset 0 0 25px rgba(55,80,255,.15);transition:.25s}.bb-cell.used{background:#090d27;border-color:#151b3e;color:#171d43;text-shadow:none}.bb-clue{width:min(95%,1100px);min-height:62%;padding:clamp(25px,5vw,76px);display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid rgba(135,151,255,.45);border-radius:28px;background:radial-gradient(circle at 50% 0,rgba(118,87,255,.22),transparent 48%),linear-gradient(145deg,#121d81,#080d42);box-shadow:0 25px 80px rgba(0,0,0,.45),inset 0 0 80px rgba(43,68,255,.15);animation:bb-in .38s ease both}.bb-clue.hot{border-color:#f5b301;background:radial-gradient(circle at 50% 0,rgba(245,179,1,.26),transparent 50%),linear-gradient(145deg,#3a2200,#130c00)}.bb-kicker{font:800 clamp(12px,1.4vw,20px) var(--mono);letter-spacing:.18em;color:#f5b301;text-transform:uppercase}.bb-question{margin:clamp(15px,3vh,35px) 0 0;font-size:clamp(27px,4.2vw,67px);line-height:1.12;font-weight:800;max-width:1100px}.bb-callout{margin-top:clamp(15px,3vh,32px);font:900 clamp(17px,2.3vw,34px) var(--mono);color:#8f9bda}.bb-callout.open{color:#fff;background:#e9163c;padding:12px 25px;border-radius:999px;box-shadow:0 0 45px rgba(233,22,60,.45);animation:pulse .65s infinite alternate}.bb-answer{color:#f5b301}.bb-attempts{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:20px}.bb-attempt{padding:8px 14px;border-radius:999px;background:#080b24;border:1px solid #323c80;font:700 clamp(11px,1.1vw,16px) var(--mono)}.bb-final-rows{width:min(900px,96%);display:grid;gap:8px;margin-top:18px}.bb-final-row{display:grid;grid-template-columns:1fr auto auto;gap:20px;padding:10px 16px;border:1px solid #343e7d;border-radius:12px;background:#090d2d;text-align:left;font-size:clamp(14px,1.5vw,22px)}.bb-final-row.ok{border-color:#29d391}.bb-final-row.bad{border-color:#f05b70}.bb-final-row b:last-child{color:#f5b301;font-family:var(--mono)}.bb-splash{font-size:clamp(55px,11vw,180px);font-weight:950;line-height:.83;font-style:italic;color:#f5b301;text-shadow:0 0 60px rgba(245,179,1,.35)}.bb-curtain{position:fixed;z-index:100;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 20%,#222b83,#070810 60%);text-align:center;padding:24px}.bb-curtain-card p{font:800 clamp(12px,1.5vw,20px) var(--mono);letter-spacing:.22em;color:#f5b301}.bb-curtain-card h1{margin:10px 0;font-size:clamp(52px,11vw,150px);line-height:.83;font-style:italic}.bb-curtain-card h1 b{display:block;color:#f5b301}.bb-start{margin-top:28px;padding:18px 35px;border:0;border-radius:999px;background:linear-gradient(135deg,#ffde59,#f5b301);color:#120c00;font-weight:950;font-size:clamp(17px,2vw,27px);cursor:pointer}.bb-flash{position:fixed;z-index:80;inset:0;display:grid;place-items:center;background:rgba(7,8,16,.9);font-size:clamp(55px,11vw,180px);font-weight:950;color:#f5b301;text-align:center}.bb-flash[hidden]{display:none}@keyframes bb-in{from{transform:scale(.82) rotateX(-10deg);opacity:0}to{transform:none;opacity:1}}@keyframes pulse{to{transform:scale(1.05)}}@media(prefers-reduced-motion:reduce){.bb-clue,.bb-callout{animation:none!important}}@media(max-width:900px){.tv-main{grid-template-columns:1fr 190px}.bb-cat{font-size:10px}.tv-join-url{display:none}}
</style>
</head>
<body class="tv-body">
<div class="tv">
  <header class="tv-head"><span class="tv-wordmark">📺 BIG SCREEN · <b>BUZZ BOARD</b></span><span id="tv-online" class="tv-online">connecting…</span></header>
  <main class="tv-main"><section class="tv-stage" id="tv-stage"></section><aside class="tv-rail"><div class="tv-join"><p class="tv-join-h">📱 SCAN TO PLAY</p><div class="tv-qr" id="tv-qr"></div><p class="tv-join-url" id="tv-url"></p></div><div class="tv-roster" id="tv-roster"></div></aside></main>
</div>
<div id="tv-flash" class="bb-flash" hidden></div>
<div id="tv-curtain" class="bb-curtain"><div class="bb-curtain-card"><p>FAB5.GAMES PRESENTS</p><h1>BUZZ <b>BOARD</b></h1><span>Turn on sound, keep the screen awake, and start the show.</span><br><button id="tv-start" class="bb-start">🔊 TAP TO START THE SHOW</button></div></div>
<canvas id="confetti"></canvas>
<script src="/shared/qr.js"></script><script src="/shared/hubnet.js"></script><script src="tv.js"></script>
</body>
</html>
