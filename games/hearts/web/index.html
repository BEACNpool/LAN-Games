<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>HEARTS · LAN GAMES</title>
<meta name="theme-color" content="#070b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%23070b14"/><text x="32" y="46" font-size="36" text-anchor="middle">♥️</text></svg>'>
<link rel="stylesheet" href="/shared/shared.css">
<link rel="stylesheet" href="hearts.css">
</head>
<body>
<div class="bg-fx" aria-hidden="true"></div>

<!-- ============ JOIN (identity gate) ============ -->
<section id="scr-join" class="scr" hidden>
  <div class="join-wrap">
    <h1 class="wordmark"><span class="wm-a">HEA</span><span class="wm-b">RTS</span></h1>
    <p class="tagline">NO PARTNERS. DUCK THE QUEEN. LOWEST SCORE WINS.</p>
    <div class="join-card">
      <label class="field-label" for="name-input">CALL SIGN</label>
      <input id="name-input" maxlength="14" autocomplete="off" spellcheck="false" placeholder="your name">
      <label class="field-label">AVATAR</label>
      <div id="avatar-grid" class="avatar-grid"></div>
      <button id="pfp-btn" class="pfp-btn" type="button">📷 OR USE A PHOTO</button>
      <button id="join-btn" class="btn btn-primary btn-big">TAKE A SEAT</button>
    </div>
  </div>
</section>

<!-- ============ LOBBY ============ -->
<section id="scr-lobby" class="scr" hidden>
  <header class="topbar">
    <a href="/" class="icon-btn" title="hub" style="display:grid;place-items:center">🕹</a>
    <span class="wordmark-sm"><span class="wm-a">HEA</span><span class="wm-b">RTS</span></span>
    <span style="display:flex;gap:8px">
      <button id="pfp-btn2" class="icon-btn" title="your photo">📷</button>
      <button id="mute-btn" class="icon-btn">🔊</button>
    </span>
  </header>
  <div class="lobby-body">
    <div class="lobby-sec">
      <div class="sec-head"><h2>AT THE TABLE</h2><span id="ready-count" class="sec-badge"></span></div>
      <div id="player-grid" class="player-grid"></div>
      <p class="seat-note" id="seat-note"></p>
    </div>
    <div class="lobby-sec">
      <div class="sec-head"><h2>TABLE RULES</h2></div>
      <div class="opt-row"><span class="field-label">PLAY TO</span>
        <div id="opt-target" class="seg"></div></div>
      <div class="opt-row"><span class="field-label">BOTS</span>
        <div id="opt-difficulty" class="seg"></div></div>
      <div class="opt-row"><span class="field-label">TURN TIMER</span>
        <div class="stepper">
          <button id="turn-minus" class="step-btn">−</button>
          <span id="turn-val" class="step-val">30s</span>
          <button id="turn-plus" class="step-btn">+</button>
        </div></div>
    </div>
  </div>
  <footer class="lobby-foot">
    <button id="ready-btn" class="btn btn-ready btn-big">READY UP</button>
    <button id="go-btn" class="btn btn-go btn-big" hidden>DEAL ME IN</button>
    <p id="lobby-hint" class="lobby-hint">waiting for players…</p>
  </footer>
</section>

<!-- ============ TABLE ============ -->
<section id="scr-table" class="scr" hidden>
  <header class="table-head">
    <a href="/" class="head-link">🕹</a>
    <div id="hand-chip" class="stat-chip">HAND 1</div>
    <div id="target-chip" class="stat-chip faint">→ 100</div>
    <div id="broken-chip" class="stat-chip broken" hidden>💔 BROKEN</div>
    <span class="head-spacer"></span>
    <button id="mute-btn2" class="icon-btn head-mute">🔊</button>
  </header>
  <div id="moon-banner" class="moon-banner" hidden>🌙</div>

  <div class="table-zone">
    <div id="plate-top" class="plate pos-top"></div>
    <div class="mid-row">
      <div id="plate-left" class="plate pos-left"></div>
      <div id="trick-area" class="trick-area">
        <div class="tslot ts-bottom" data-ts="0"></div>
        <div class="tslot ts-left" data-ts="1"></div>
        <div class="tslot ts-top" data-ts="2"></div>
        <div class="tslot ts-right" data-ts="3"></div>
        <div id="table-note" class="table-note"></div>
      </div>
      <div id="plate-right" class="plate pos-right"></div>
    </div>
    <div id="plate-me" class="plate pos-me"></div>
  </div>

  <div id="hand-fan" class="hand-fan"></div>
  <p id="watch-note" class="watch-note" hidden>WATCHING — next game is yours</p>

  <!-- passing sheet (sits above the fan; pick 3 from your hand) -->
  <div id="pass-sheet" class="pass-sheet" hidden>
    <p class="ps-title"><span id="ps-title">PASS 3 CARDS</span><span id="ps-timer" class="ps-timer"></span></p>
    <div id="ps-picks" class="ps-picks"></div>
    <button id="pass-btn" class="btn btn-primary btn-big" disabled>PASS THESE 3</button>
    <p id="ps-wait" class="ps-wait" hidden></p>
  </div>
</section>

<!-- hand-end scoreboard -->
<div id="scorecard" class="modal" hidden>
  <div class="modal-card">
    <p class="modal-title" id="sc-title">HAND 1 — SCORES</p>
    <p id="sc-moon" class="sc-moon-line" hidden></p>
    <div id="sc-body"></div>
    <p id="sc-next" class="sc-next"></p>
  </div>
</div>

<!-- game over -->
<div id="gameover" class="modal" hidden>
  <div class="modal-card go-card">
    <p class="go-crown">👑</p>
    <p id="go-title" class="go-title">WINNER</p>
    <p id="go-line" class="go-line"></p>
    <div id="go-standings" class="go-standings"></div>
    <button id="rematch-btn" class="btn btn-primary btn-big">BACK TO LOBBY</button>
    <p id="go-auto" class="lobby-hint"></p>
  </div>
</div>

<div id="countdown-overlay" class="countdown-overlay" hidden><span id="countdown-num">3</span></div>
<canvas id="confetti"></canvas>

<script src="/shared/hubnet.js"></script>
<script src="/shared/brag.js"></script>
<script src="hearts.js"></script>
</body>
</html>
